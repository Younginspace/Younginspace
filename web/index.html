<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Younginspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="warp-overlay"></div>

    <header id="header">
      <div id="header-title">YOUNGINSPACE</div>
      <nav id="nav-right">
        <a href="#" class="nav-link" data-i18n="about">About</a>
        <a href="#" class="nav-link" data-i18n="blog">Blog</a>
        <button id="lang-toggle" class="nav-link" title="Switch language">EN</button>
        <div style="position:relative">
          <a href="#" class="nav-link nav-signin" data-i18n="signin">Sign In</a>
          <div id="user-dropdown">
            <button id="signout-btn" data-i18n="signout">Sign Out</button>
          </div>
        </div>
      </nav>
    </header>

    <h1 id="title">Younginspace</h1>

    <div id="project-info">
      <h2 id="project-title"></h2>
      <p id="project-desc"></p>
      <a id="project-link" href="#" target="_blank" rel="noopener noreferrer">GitHub &rarr;</a>
    </div>

    <div id="scroll-hint" data-i18n="scrollHint">Scroll to explore</div>
    <div id="space-hint" data-i18n="spaceHint">Press space to continue</div>

    <div id="scene-indicator"></div>

    <!-- Guestbook Floating Button -->
    <button id="guestbook-fab" data-i18n="guestbookFab">Leave something behind :)</button>

    <!-- Message Board Modal -->
    <div id="board-modal">
      <div id="board-backdrop"></div>
      <div id="board-dialog">
        <button id="board-close">&times;</button>
        <h2 id="board-title">Message Board</h2>
        <div id="board-tabs">
          <button id="board-tab-public" class="board-tab active">Messages</button>
          <button id="board-tab-admin" class="board-tab" style="display:none">Admin</button>
        </div>
        <div id="board-list"></div>
        <div id="board-admin-panel" style="display:none">
          <div id="board-admin-list"></div>
        </div>
        <div id="board-form" style="display:none">
          <textarea id="board-input" maxlength="500" rows="3" placeholder="Leave a message..."></textarea>
          <div id="board-form-footer">
            <span id="board-char-count">0/500</span>
            <button id="board-submit">Send</button>
          </div>
        </div>
        <div id="board-login-hint" style="display:none">Sign in to leave a message</div>
      </div>
    </div>

    <div id="auth-modal">
      <div id="auth-backdrop"></div>
      <div id="auth-dialog">
        <button id="auth-close">&times;</button>
        <div id="auth-container"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
